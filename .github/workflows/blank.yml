name: Build .love

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create .love file
        run: |
          mkdir -p dist
          zip -9 -r dist/game.love . -x ".git/*" ".github/*" "dist/*"

      - name: Upload .love artifact
        uses: actions/upload-artifact@v3
        with:
          name: love2d-game
          path: dist/game.love
