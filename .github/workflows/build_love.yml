name: Build .love

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .love file
        run: |
          mkdir -p dist
          zip -9 -r dist/DiceDeluxe.love . -x ".git/*" ".github/*" "dist/*"

      - name: Upload .love artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiceDeluxe
          path: dist/DiceDeluxe.love
